<!DOCTYPE html>
<html>
  <head>
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script>
      function generateQR() {
        var url = document.getElementById('urlInput').value;
        document.getElementById('qrImage').src = 'https://qrgen-djrh.onrender.com/generate?url=' + url;
      }
    </script>
  </head>
  <body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 400px;">
      <h2 class="text-center mb-4">QR Code Generator</h2>
      <input type="text" id="urlInput" class="form-control mb-3" placeholder="Enter URL here" />
      <button onclick="generateQR()" class="btn btn-primary w-100">Generate QR</button>
      <div class="text-center mt-4">
        <img id="qrImage" src="" alt="" class="img-fluid" />
      </div>
    </div>
  </body>
</html>
